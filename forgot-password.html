<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:40px;
    border-radius:15px;
    width:350px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#0b6b61;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#0b6b61;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0b84b3;
}

a{
    text-decoration:none;
    color:#0b6b61;
}
</style>
</head>

<body>

<div class="container">

    <h2>Forgot Password</h2>

    <input type="email" placeholder="Enter Registered Email" required>

    <button onclick="window.location.href='reset-password.html'">
        Send Reset Link
    </button>

    <p style="text-align:center;margin-top:15px;">
        <a href="login.html">Back to Login</a>
    </p>

</div>

</body>
</html>
