<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MedCare</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(to right,#062d2c,#0f5d57);
        }

        .login-container{
            background:white;
            width:400px;
            padding:40px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        .login-container h1{
            text-align:center;
            color:#0b6b61;
            margin-bottom:25px;
        }

        .input-box{
            margin-bottom:20px;
        }

        .input-box label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        .input-box input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        .login-btn{
            width:100%;
            padding:12px;
            border:none;
            background:#0b6b61;
            color:white;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        .login-btn:hover{
            background:#0b84b3;
        }

        .extra-links{
            text-align:center;
            margin-top:15px;
        }

        .extra-links a{
            text-decoration:none;
            color:#0b6b61;
        }
    </style>
</head>
<body>

    <div class="login-container">

        <h1><i class="fa-solid fa-user-doctor"></i> MedCare Login</h1>

        <form action="login.php" method="POST">
            <div class="input-box">
                <label>Email</label>
               <input type="email" name="email" placeholder="Enter Email" required>
            </div>

            <div class="input-box">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter Password" required>
            </div>
            <button type="submit" class="login-btn">
                Login
            </button>
        </form>
    

        <div class="extra-links">
            <p style="text-align:center; margin-top:10px;">
            <a href="forgot-password.html">Forgot Password?</a>
             </p>
<p style="text-align:center;margin-top:15px;">
    New User?
    <a href="register.html">Register Here</a>
</p>
        </div>

    </div>

</body>
</html>
